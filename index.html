<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Okinawa Car Rental &amp; Road Trip Guide</title>
  <meta name="description" content="" />
  <meta property="og:title" content="Okinawa Car Rental &amp; Road Trip Guide" />
  <meta property="og:url" content="https://rentacar.nice.okinawa" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --coral:  #E8835A;
      --amber:  #F4A535;
      --navy:   #1A2E44;
      --sand:   #FBF7F0;
      --green:  #1D9E75;
      --muted:  #6B7A8D;
      --border: rgba(26,46,68,0.1);
      --shadow: 0 8px 40px rgba(26,46,68,0.12);
      --radius: 16px;
      --font-display: 'Cormorant Garamond', 'Noto Serif SC', 'Noto Serif TC', serif;
      --font-body:    'DM Sans', 'Noto Serif SC', 'Noto Serif TC', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--sand); color: var(--navy); overflow-x: hidden; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
      background: rgba(251,247,240,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); transition: box-shadow 0.3s;
    }
    nav.scrolled { box-shadow: 0 2px 20px rgba(26,46,68,0.1); }
    .nav-logo { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; color: var(--navy); text-decoration: none; }
    .nav-logo span { color: var(--coral); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .lang-switcher { display: flex; gap: 4px; }
    .lang-btn {
      padding: 5px 11px; border: 1px solid var(--border); border-radius: 20px;
      background: transparent; font-family: var(--font-body); font-size: 0.75rem;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active, .lang-btn:hover { background: var(--coral); border-color: var(--coral); color: white; }
    .nav-cta {
      padding: 9px 22px; background: var(--coral); color: white; border: none;
      border-radius: 30px; font-family: var(--font-body); font-size: 0.85rem;
      font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .nav-cta:hover { background: var(--navy); transform: translateY(-1px); }

    /* ── Hero ── */
    #hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 80px; }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(26,46,68,0.78) 0%, rgba(232,131,90,0.35) 60%, rgba(244,165,53,0.25) 100%),
        url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1800&q=80') center/cover no-repeat;
    }
    .hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-content {
      position: relative; z-index: 2; max-width: 1100px; margin: 0 auto;
      padding: 0 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px;
      background: rgba(29,158,117,0.2); border: 1px solid rgba(29,158,117,0.4); border-radius: 30px;
      color: #5de0b0; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 28px; animation: fadeUp 0.8s 0.1s both;
    }
    .hero-badge::before { content: '🗺️'; font-size: 0.9rem; }
    .hero-title {
      font-family: var(--font-display); font-size: clamp(2.6rem, 4.5vw, 3.8rem);
      font-weight: 700; color: white; line-height: 1.12; margin-bottom: 20px;
      animation: fadeUp 0.8s 0.2s both;
    }
    .hero-title em { font-style: italic; color: var(--amber); }
    .hero-sub {
      font-size: 1.05rem; color: rgba(255,255,255,0.82); line-height: 1.7;
      margin-bottom: 40px; animation: fadeUp 0.8s 0.35s both;
    }
    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; animation: fadeUp 0.8s 0.5s both; }
    .btn-primary {
      padding: 15px 32px; background: var(--coral); color: white; border: none;
      border-radius: 50px; font-family: var(--font-body); font-size: 0.95rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(232,131,90,0.4); display: inline-block;
    }
    .btn-primary:hover { background: #d4704a; transform: translateY(-2px); box-shadow: 0 10px 32px rgba(232,131,90,0.5); }
    .btn-outline {
      padding: 15px 32px; background: transparent; color: white;
      border: 2px solid rgba(255,255,255,0.5); border-radius: 50px;
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all 0.25s; display: inline-block;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.15); border-color: white; }
    .hero-card {
      background: rgba(251,247,240,0.1); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;
      padding: 32px; animation: fadeUp 0.8s 0.4s both;
    }
    .hero-card-title { font-family: var(--font-display); font-size: 1.2rem; color: white; margin-bottom: 20px; font-weight: 600; }
    .service-list { list-style: none; }
    .service-list li {
      display: flex; align-items: center; gap: 12px; padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); font-size: 0.88rem;
    }
    .service-list li:last-child { border-bottom: none; }
    .service-list .s-icon {
      width: 34px; height: 34px; background: rgba(232,131,90,0.25); border-radius: 9px;
      display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0;
    }
    .service-list .s-title { color: white; font-size: 0.85rem; font-weight: 500; display: block; }
    .service-list .s-sub { color: rgba(255,255,255,0.55); font-size: 0.75rem; display: block; }

    /* ── Trust Bar ── */
    #trust { background: var(--navy); padding: 18px 40px; }
    .trust-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .trust-item { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.8); font-size: 0.82rem; white-space: nowrap; }
    .trust-item::before {
      content: '✓'; width: 20px; height: 20px; background: var(--green); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: white; font-weight: 700; flex-shrink: 0;
    }
    .trust-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.15); }

    /* ── Section base ── */
    section { padding: 90px 40px; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-eyebrow { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--coral); margin-bottom: 12px; }
    .section-title { font-family: var(--font-display); font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 700; line-height: 1.15; color: var(--navy); margin-bottom: 16px; }
    .section-title em { font-style: italic; color: var(--coral); }
    .section-desc { font-size: 1rem; color: var(--muted); line-height: 1.7; max-width: 560px; margin-bottom: 48px; }

    /* ── Services ── */
    #services { background: var(--sand); }
    .services-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 36px; }
    .service-card {
      background: white; border-radius: var(--radius); padding: 30px 24px;
      box-shadow: 0 2px 20px rgba(26,46,68,0.06); transition: all 0.3s; position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--coral), var(--amber));
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
    }
    .service-card:hover { transform: translateY(-6px); box-shadow: var(--shadow); }
    .service-card:hover::before { transform: scaleX(1); }
    .card-icon { font-size: 2rem; margin-bottom: 16px; display: block; }
    .card-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--navy); margin-bottom: 10px; }
    .card-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.65; }
    .card-tag { display: inline-block; margin-top: 16px; padding: 4px 12px; background: rgba(232,131,90,0.1); border-radius: 20px; font-size: 0.74rem; color: var(--coral); font-weight: 500; }

    /* ── Explore Okinawa ── */
    #explore { background: white; }
    .explore-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 48px; }
    .explore-card {
      background: var(--sand); border-radius: var(--radius); padding: 28px 24px;
      transition: all 0.3s; border: 1px solid transparent; position: relative; overflow: hidden;
    }
    .explore-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--green), var(--amber));
      transform: scaleX(0); transform-origin: left; transition: transform 0.35s;
    }
    .explore-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: rgba(29,158,117,0.15); }
    .explore-card:hover::after { transform: scaleX(1); }
    .explore-icon { font-size: 2rem; margin-bottom: 14px; display: block; }
    .explore-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; color: var(--navy); margin-bottom: 10px; }
    .explore-desc { font-size: 0.87rem; color: var(--muted); line-height: 1.65; }

    /* Activities cross-sell */
    .activities-block {
      border-top: 1px solid var(--border); padding-top: 44px;
    }
    .activities-label {
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green); margin-bottom: 20px;
    }
    .activities-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .activity-card {
      background: var(--sand); border-radius: 14px; padding: 22px 20px;
      text-decoration: none; color: var(--navy); transition: all 0.25s;
      border: 1.5px solid transparent; display: block;
    }
    .activity-card:hover { border-color: var(--green); transform: translateY(-3px); box-shadow: 0 6px 24px rgba(29,158,117,0.12); }
    .activity-icon { font-size: 1.7rem; margin-bottom: 10px; display: block; }
    .activity-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    .activity-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 12px; }
    .activity-cta { font-size: 0.8rem; color: var(--green); font-weight: 500; }

    /* ── Why ── */
    #why { background: var(--sand); }
    .why-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
    .why-card { text-align: center; padding: 30px 18px; border-radius: var(--radius); background: white; transition: all 0.3s; }
    .why-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .why-icon { font-size: 2rem; margin-bottom: 14px; }
    .why-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--navy); margin-bottom: 10px; }
    .why-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.6; }

    /* ── FAQ ── */
    #faq { background: white; }
    .faq-list { display: flex; flex-direction: column; gap: 12px; max-width: 800px; }
    .faq-item { background: var(--sand); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .faq-q {
      padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
      cursor: pointer; font-weight: 500; font-size: 0.95rem; color: var(--navy); transition: background 0.2s;
    }
    .faq-q:hover { background: rgba(232,131,90,0.04); }
    .faq-q::after { content: '+'; font-size: 1.3rem; color: var(--coral); flex-shrink: 0; transition: transform 0.2s; }
    .faq-item.open .faq-q::after { transform: rotate(45deg); }
    .faq-a { display: none; padding: 0 24px 20px; font-size: 0.88rem; color: var(--muted); line-height: 1.7; }
    .faq-item.open .faq-a { display: block; }

    /* ── Business in Okinawa ── */
    #biz-okinawa { background: var(--navy); position: relative; overflow: hidden; }
    #biz-okinawa::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,165,53,0.12) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    #biz-okinawa .section-eyebrow { color: var(--amber); }
    #biz-okinawa .section-title { color: white; }
    #biz-okinawa .section-title em { color: var(--amber); }
    #biz-okinawa .section-desc { color: rgba(255,255,255,0.62); max-width: 640px; }
    .biz-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 40px; }
    .biz-chip {
      display: flex; align-items: center; gap: 10px; padding: 16px 20px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: rgba(255,255,255,0.85); font-size: 0.88rem; transition: all 0.25s;
    }
    .biz-chip:hover { background: rgba(255,255,255,0.11); border-color: rgba(244,165,53,0.35); }
    .biz-chip::before {
      content: '✓'; width: 22px; height: 22px; background: rgba(29,158,117,0.3);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; color: #5de0b0; font-weight: 700; flex-shrink: 0;
    }
    .btn-amber {
      padding: 15px 36px; background: var(--amber); color: var(--navy); border: none;
      border-radius: 50px; font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(244,165,53,0.3); display: inline-block;
    }
    .btn-amber:hover { background: #e09520; transform: translateY(-2px); }

    /* ── Contact ── */
    #contact { background: var(--sand); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .contact-channels { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .contact-channel {
      display: flex; align-items: center; gap: 16px; padding: 16px 20px;
      background: white; border-radius: 12px; text-decoration: none;
      transition: all 0.2s; border: 1px solid transparent; color: var(--navy);
    }
    .contact-channel:hover { border-color: var(--coral); background: rgba(232,131,90,0.04); transform: translateX(4px); }
    .ch-icon { width: 42px; height: 42px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .ch-icon.wa { background: rgba(37,211,102,0.12); }
    .ch-icon.wc { background: rgba(9,184,62,0.12); }
    .ch-icon.ln { background: rgba(0,195,0,0.1); }
    .ch-icon.ig { background: rgba(225,48,108,0.1); }
    .ch-icon.em { background: rgba(232,131,90,0.12); }
    .ch-label { font-size: 0.76rem; color: var(--muted); }
    .ch-value { font-size: 0.92rem; font-weight: 500; }
    .contact-form { display: flex; flex-direction: column; gap: 16px; background: white; padding: 32px; border-radius: var(--radius); }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.82rem; font-weight: 500; color: var(--muted); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: var(--font-body); font-size: 0.9rem; color: var(--navy);
      background: var(--sand); transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--coral); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .btn-submit {
      padding: 14px; background: var(--coral); color: white; border: none;
      border-radius: 10px; font-family: var(--font-body); font-size: 0.95rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .btn-submit:hover { background: #d4704a; }
    .form-note { font-size: 0.78rem; color: var(--muted); text-align: center; }

    /* ── Footer ── */
    footer { background: var(--navy); padding: 40px; color: rgba(255,255,255,0.5); font-size: 0.82rem; }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    .footer-brand { font-family: var(--font-display); font-size: 1.1rem; color: white; font-weight: 600; }
    .footer-brand span { color: var(--coral); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--coral); }
    .footer-lang { display: flex; gap: 6px; }
    .footer-lang-btn { padding: 4px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; background: transparent; color: rgba(255,255,255,0.5); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
    .footer-lang-btn:hover { color: white; border-color: white; }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }
    .reveal-delay-6 { transition-delay: 0.6s; }

    /* ── Mobile ── */
    @media (max-width: 1000px) {
      .services-grid { grid-template-columns: repeat(2,1fr); }
      .activities-grid { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 900px) {
      nav { padding: 14px 20px; }
      .nav-cta { display: none; }
      .hero-content { grid-template-columns: 1fr; gap: 32px; padding: 0 20px; }
      .hero-card { display: none; }
      .hero-title { font-size: 2.2rem; }
      section { padding: 60px 20px; }
      .explore-grid { grid-template-columns: repeat(2,1fr); }
      .why-grid { grid-template-columns: repeat(2,1fr); }
      .contact-grid { grid-template-columns: 1fr; gap: 36px; }
      .biz-grid { grid-template-columns: 1fr 1fr; }
      .trust-divider { display: none; }
      #trust { padding: 14px 20px; }
      footer { padding: 28px 20px; }
      .footer-inner { flex-direction: column; text-align: center; }
    }
    @media (max-width: 600px) {
      .hero-btns { flex-direction: column; }
      .services-grid { grid-template-columns: 1fr; }
      .explore-grid { grid-template-columns: 1fr; }
      .activities-grid { grid-template-columns: 1fr 1fr; }
      .why-grid { grid-template-columns: 1fr 1fr; }
      .biz-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav id="main-nav">
  <a href="#" class="nav-logo">car.<span>nice.okinawa</span></a>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang-btn="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang-btn="zht" onclick="setLang('zht')">繁</button>
      <button class="lang-btn" data-lang-btn="zh" onclick="setLang('zh')">简</button>
    </div>
    <a href="#contact" class="nav-cta" data-t="navContact"></a>
  </div>
</nav>

<!-- ── HERO ── -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-left">
      <div class="hero-badge" data-t="heroBadge"></div>
      <h1 class="hero-title" data-t="heroTitle"></h1>
      <p class="hero-sub" data-t="heroSub"></p>
      <div class="hero-btns">
